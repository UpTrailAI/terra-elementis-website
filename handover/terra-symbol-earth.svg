<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Terra Elementis Earth Mark</title>
  <desc id="logo-desc">A sovereign earth and mineral strata emblem in gold.</desc>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5C773"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B88B24"/>
    </linearGradient>
  </defs>

  <!-- Sovereign ring -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Earth horizon / strata -->
  <path d="M24 48 C38 40, 82 40, 96 48" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
  <path d="M22 62 C38 54, 82 54, 98 62" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M25 76 C40 69, 80 69, 95 76" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Mineral core (faceted crystal) -->
  <path d="M60 41 L71 54 L66 73 H54 L49 54 Z" fill="#D4AF37"/>
  <path d="M60 41 L66 73" stroke="#0F172A" stroke-opacity="0.18" stroke-width="1.5"/>
  <path d="M60 41 L54 73" stroke="#0F172A" stroke-opacity="0.14" stroke-width="1.2"/>

  <!-- North marker -->
  <path d="M60 12 L64 20 H56 Z" fill="#D4AF37" opacity="0.9"/>
</svg>
